<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Loaded</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="cards">
    <div class="card status-card">
        <h3>Server Status</h3>
        <div id="status-Indicator"></div>
        <p>Online: <span id="player-count">0/10</span></p>
    </div>
    <div class="card command-card">
        <h3>Command</h3>
        <select name="Server" id="servers"></select>
    </div>
    <div class="card management-card">
        <h3>Utilites</h3>
        <input class="type" type="text" id="whitelist-input" placeholder="Player">
        <button class="add-button" onclick="addToWhiteList()">Add To WhiteList</button>
    </div>
<div class="card log-card">
    <h3>System Logs</h3>
    <div id="log-window" style="font-family: monospace; font-size: 12px; color: #A0AEC0; height: 100%; overflow-y: auto;">
        > System initialized...
    </div>
</div>
 <div class="card ping-card">
        <h1>Ping</h1>
        <p>Server Latency:<span id="ping"> ms</span></p>
        <p>Avg Latency:<span> ms</span></p>
        <p>Highest Latency:<span> ms</span></p>
    </div>
    <div class="card quick-file">
        <h1>Files</h1>
        <div class="File">
        <button>Config Files</button>
        <small style="color: #718096; font-size: 11px;">Edit server-properties</small>
        </div>
        <div class="File">
        <button>Server Files</button>
        <small style="color: #718096; font-size: 11px;">Open root directory</small>
        </div>
    </div>
<div class="card telemetry-card" style="width: 100%;">
    <h3>SYSTEM TELEMETRY</h3>
    <div class="telemetry-group">
        <label>CPU Usage</label>
        <span id="cpu-value">0</span><label class="per cpu-per">/100</label>
        <div class="progress-bar">
             <div class="back-bar-cpu"></div>
        </div>
    </div>
    <div class="telemetry-group">
        <label>Memory Usage</label>
        <span id="mem-value">0</span><label class="per mem-per">/100</label>
        <div class="progress-bar">
            <div class="back-bar-mem"></div>
        </div>
        <label class="total-used">Memory in use: </label><span id="mb">0 / 0</span>
    </div>
     <div class="keys">
            <div class="red">
                <div class="color-box red"></div> <span>High Load</span>
            </div>
            <div class="yellow">
                <div class="color-box yellow"></div> <span>Med Load</span>
            </div>
            <div class="blue">
                <div class="color-box blue"></div> <span>Server Load</span>
            </div>
        </div>
    </div>
</div>   
 <script src="index.js" defer></script>
</body> 
</html>
