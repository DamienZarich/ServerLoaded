<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Loaded</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="cards">
    <div class="card status-card">
        <h3>Server Status</h3>
        <div id="status-Indicator"></div>
        <p>Online: <span id="player-count">0/10</span></p>
    </div>
    <div class="card command-card">
        <h3>Command</h3>
        <button class="start-button" onclick="sendCommand('start')">Initialize Server</button>
        <button class="stop-button" onclick="sendCommand('stop')">Stop Server</button>
    </div>
    <div class="card management-card">
        <h3>Utilites</h3>
        <input class="type" type="text" id="whitelist-input" placeholder="Player">
        <button class="add-button" onclick="addToWhiteList()">Add To WhiteList</button>
    </div>
    <div class="card log-card">
    <h3>System Logs</h3>
    <div id="log-window" style="font-family: monospace; font-size: 12px; color: #A0AEC0; height: 100%; overflow-y: auto;">
        > System initialized...
    </div>
    <button class="start-button" onclick="sendCommand('start', event)">Initialize Server</button>
<button class="stop-button" onclick="sendCommand('stop', event)">Stop Server</button>
</div>
 </div>   
 <script src="script.js" defer></script>
</body>
</html>
